# Spec Checker - Checker module

module: checker
language: rust
source_path: src/checker.rs

exposes:
  check:
    signature: "(&self, spec: &ModuleSpec) -> Result<CheckResult>"
    requires:
      - spec has valid module name
    ensures:
      - Returns errors for missing exposed functions
      - Returns errors for exposed internal functions
      - Returns errors for forbidden dependencies
      - Returns warnings for unlisted dependencies

  with_specs:
    signature: "(self, specs: &[ModuleSpec]) -> Self"
    ensures:
      - Builds layer map from all specs for cross-module checking

internal:
  - check_exposes
  - check_internal
  - check_dependencies
  - check_forbidden_deps
  - check_layer_violations
  - find_source_file
  - extract_module_name

depends_on:
  - src/extractors/mod.rs
  - src/spec.rs

external_deps:
  - anyhow
  - tempfile

layer: domain
