module: checker
description: >-
  Three-tier verification engine that checks source code against module,
  composition, and subsystem specs using syntactic, rules-engine, type-formula,
  and SMT strategies.
language: rust
source_path: src/checker.rs
source_hash: 3e7121fe481054ce
layer: domain
exposes:
  ConstraintKind:
    kind: variable
    description: Classification of a spec constraint (structural, dependency, architectural, event, type-constraint, protocol).
  ConstraintSeverity:
    kind: variable
    description: Error or warning severity for a constraint check result.
  VerificationTier:
    kind: variable
    description: Which verification strategy decided a result (syntactic, rules-engine, type-formula, SMT).
  ConstraintResult:
    kind: variable
    description: Single constraint check outcome with kind, tier, severity, and message.
  CheckResult:
    kind: variable
    description: Aggregated result of checking a spec, containing errors, warnings, and typed constraint results.
  CheckResult.warning:
    kind: function
    description: Record a warning message.
  CheckResult.error:
    kind: function
    description: Record an error message.
  SpecChecker:
    kind: variable
    description: Main checker struct holding source root, spec map, rules, layer config, and external specs.
  SpecChecker.new:
    kind: function
    description: Create a checker rooted at the given source directory with built-in rules.
  SpecChecker.with_specs:
    kind: function
    description: Load module specs into the checker for cross-module lookups.
  SpecChecker.with_rules_config:
    kind: function
    description: Apply custom rules configuration, disabling/adding rules and layer definitions.
  SpecChecker.with_dependency_graph:
    kind: function
    description: Attach resolved cross-project dependency specs for boundary checks.
  SpecChecker.check:
    kind: function
    description: Check a single module spec against its source file.
  SpecChecker.check_composition:
    kind: function
    description: Check cross-module composition constraints (events, interfaces, contracts, state ownership).
  SpecChecker.check_subsystem:
    kind: function
    description: Check a subsystem spec against its constituent module specs.
  SpecChecker.check_cross_project_boundaries:
    kind: function
    description: Verify cross-project dependency references respect public surface constraints.
forbidden_deps:
  - ai_init
  - ai_refine
  - main
owns_state:
  - ConstraintKind
  - VerificationTier
  - ConstraintSeverity
  - ConstraintResult
  - CheckResult
  - SpecChecker
