# Spec Checker - Checker module
# Inherits: language=rust, context=core, stability=stable (root)

module: checker
source_path: src/checker.rs

layer: application       # Orchestrates domain + infrastructure

exposes:
  ConstraintKind:
    kind: type
    type_constraints:
      - "is_sum(Self)"
      - "has_variant(Self, Structural)"
      - "has_variant(Self, Dependency)"
      - "has_variant(Self, Architectural)"
      - "has_variant(Self, Event)"
      - "has_variant(Self, TypeConstraint)"
      - "has_variant(Self, Protocol)"

  VerificationTier:
    kind: type
    type_constraints:
      - "is_sum(Self)"
      - "has_variant(Self, Syntactic)"
      - "has_variant(Self, RulesEngine)"
      - "has_variant(Self, TypeFormula)"

  ConstraintResult:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "has_field(Self, kind)"
      - "has_field(Self, tier)"
      - "has_field(Self, severity)"
      - "has_field(Self, message)"

  CheckResult:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "has_field(Self, errors)"
      - "has_field(Self, warnings)"
      - "has_field(Self, constraint_results)"
      - "equals(con(field(errors)), Vec)"
      - "equals(con(field(warnings)), Vec)"

  SpecChecker:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "has_field(Self, source_root)"
      - "has_field(Self, spec_map)"
      - "has_field(Self, rules)"
      - "has_field(Self, layer_config)"

  CheckResult.error:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"

  CheckResult.warning:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"

  SpecChecker.new:
    kind: function
    type_constraints:
      - "equals(param(source_root), PathBuf)"
      - "equals(return, Self)"
    ensures:
      - Creates checker with default built-in rules

  SpecChecker.with_specs:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"               # takes self by value (builder)
      - "equals(return, Self)"
    ensures:
      - Builds spec map for cross-module checking

  SpecChecker.with_rules_config:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"               # takes self by value (builder)
      - "equals(return, Self)"
    ensures:
      - Removes disabled built-in rules
      - Adds custom rules from config
      - Applies custom layer config if provided

  SpecChecker.check:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"
      - "equals(param(spec), ModuleSpec)"
      - "fallible(return)"
      - "equals(con(return), Result)"
    requires:
      - spec has valid module name
    ensures:
      - Returns errors for missing exposed functions
      - Returns errors for exposed internal functions
      - Returns errors for forbidden dependencies
      - Returns errors for architectural rule violations
      - Returns warnings for unlisted dependencies

depends_on:
  - src/extractors/mod.rs
  - src/spec.rs
  - src/rules.rs
  - src/type_formula.rs

external_deps:
  - anyhow
  - tempfile

forbidden_deps:
  - clap          # CLI concerns belong in main
  - colored       # output formatting belongs in main
  - syn           # AST parsing belongs in extractors

invariants:
  - "Errors are always more severe than warnings"
  - "check() never panics, returns Result"
  - "All built-in rules can be disabled via config"
