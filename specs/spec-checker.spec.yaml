# Spec Checker - Self-specification
# The checker verifies its own structure

module: spec-checker
language: rust
source_path: src/main.rs

# CLI commands exposed
exposes:
  cmd_check:
    signature: "(spec_path: &PathBuf, source_root: &PathBuf, format: &str) -> Result<()>"
    ensures:
      - Loads all spec files from path
      - Runs checker against source_root
      - Prints errors/warnings
      - Exits with code 1 if errors found

  cmd_init:
    signature: "(source: &PathBuf, language: Option<&str>, output: Option<&PathBuf>) -> Result<()>"
    ensures:
      - Detects language from extension if not specified
      - Extracts module info from source
      - Outputs YAML spec

  cmd_diff:
    signature: "(spec_path: &PathBuf, source_path: &PathBuf) -> Result<()>"
    ensures:
      - Compares spec to implementation
      - Shows missing/extra functions
      - Shows forbidden dependency violations

internal:
  - load_specs
  - load_spec
  - detect_language

depends_on:
  - checker
  - extractors
  - spec

external_deps:
  - clap
  - serde
  - serde_yaml
  - anyhow
  - colored
  - glob
  - regex

forbidden_deps:
  - test
  - mock

layer: interface

---
module: checker
language: rust
source_path: src/checker.rs

exposes:
  check:
    signature: "(&self, spec: &ModuleSpec) -> Result<CheckResult>"
    requires:
      - spec has valid module name
    ensures:
      - Returns errors for missing exposed functions
      - Returns errors for exposed internal functions
      - Returns errors for forbidden dependencies
      - Returns warnings for unlisted dependencies

internal:
  - check_exposes
  - check_internal
  - check_dependencies
  - check_forbidden_deps
  - find_source_file

depends_on:
  - extractors
  - spec

layer: domain

---
module: extractors
language: rust
source_path: src/extractors/mod.rs

exposes:
  get_extractor:
    signature: "(language: &str) -> Result<Box<dyn Extractor>>"
    requires:
      - language is "solidity", "rust", or alias
    ensures:
      - Returns appropriate extractor
      - Returns error for unsupported language

depends_on:
  - solidity
  - rust

layer: infrastructure

---
module: spec
language: rust
source_path: src/spec.rs

exposes:
  ModuleSpec:
    ensures:
      - Deserializes from YAML
      - Contains exposes, internal, depends_on, forbidden_deps
  
  FunctionSpec:
    ensures:
      - Contains signature, requires, ensures, modifies
  
  Layer:
    ensures:
      - Has can_depend_on method
      - Enforces infrastructure < domain < application < interface

internal:
  - from_extracted

layer: domain

invariants:
  - Layer dependencies are acyclic
  - Infrastructure cannot depend on Domain/Application/Interface
  - Domain cannot depend on Application/Interface
