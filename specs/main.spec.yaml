# Spec Checker - Main CLI module
# Inherits: language=rust (root)
# Overrides: context=cli, stability=normal, layer=interface

module: main
description: "CLI entry point: parses commands (check, init, diff, toposort) and orchestrates spec-checker operations"
source_path: src/main.rs

layer: interface
context: cli
stability: normal

# No public functions - main() is the entry point but not pub fn
# CLI is exposed via clap derive macros on Cli struct
exposes: {}

depends_on:
  - src/checker.rs
  - src/extractors/mod.rs
  - src/spec.rs
  - src/rules.rs
  - src/behavioral.rs

external_deps:
  - clap
  - serde_yaml
  - anyhow
  - colored
  - glob
  - tokio

forbidden_deps:
  - tempfile     # test-only dependency
  - syn          # should go through extractors
  - regex        # should go through extractors

invariants:
  - "CLI always returns exit code 1 on validation errors"
  - "All output goes to stdout (errors to stderr)"
  - "No unsafe code"
  - "check output tags every result with [kind|tier]"
  - "Composition checks run automatically when multiple specs loaded"
  - "Subsystem checks run automatically when .subsystem.yaml files found"
