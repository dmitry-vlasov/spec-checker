# Spec Checker - Main CLI module
# Inherits: language=rust (root)
# Overrides: context=cli, stability=normal, layer=interface

module: main
source_path: src/main.rs

layer: interface
context: cli
stability: normal

# No public functions - main() is the entry point but not pub fn
# CLI is exposed via clap derive macros on Cli struct
exposes: {}

depends_on:
  - src/checker.rs
  - src/extractors/mod.rs
  - src/spec.rs
  - src/rules.rs

external_deps:
  - clap
  - serde_yaml
  - anyhow
  - colored
  - glob

forbidden_deps:
  - tempfile     # test-only dependency
  - syn          # should go through extractors
  - regex        # should go through extractors

invariants:
  - "CLI always returns exit code 1 on validation errors"
  - "All output goes to stdout (errors to stderr)"
