module: types
description: Shared data types that represent source-code entities (types, functions, fields) extracted by language-specific parsers.
language: rust
source_path: src/types.rs
source_hash: adf70cb876eb3114
layer: domain
exposes:
  TypeRepr:
    kind: type
    description: Syntactic representation of a type expression as written in source code (e.g. Named, Applied, Tuple, Reference, FnPointer).
  TypeKind:
    kind: type
    description: Discriminant for type definitions — struct, enum, trait, or type alias.
  TypeInfo:
    kind: type
    description: Rich type definition extracted from source, including fields, variants, trait impls, and derives.
  FunctionInfo:
    kind: type
    description: Structured function/method signature with parameters, return type, and generics.
  ParamInfo:
    kind: type
    description: A single function parameter with optional name and structured type.
  FieldInfo:
    kind: type
    description: A named field with its type and visibility (used in structs and enum variants).
  VariantInfo:
    kind: type
    description: An enum variant with its name and fields.
  GenericParam:
    kind: type
    description: A generic type parameter with optional trait bounds.
  Visibility:
    kind: type
    description: Visibility qualifier for fields and items (Public or Private).
forbidden_deps:
  - extractors
  - checker
  - ai
  - cli
owns_state:
  - TypeRepr
  - TypeKind
  - GenericParam
  - Visibility
  - FieldInfo
  - VariantInfo
  - TypeInfo
  - ParamInfo
  - FunctionInfo
