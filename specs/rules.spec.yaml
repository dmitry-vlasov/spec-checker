# Spec Checker - Rules module (DSL engine)
# Inherits: language=rust, context=core, stability=stable (root)

module: rules
source_path: src/rules.rs

layer: domain

exposes:
  builtin_rules:
    kind: function
    type_constraints:
      - "equals(con(return), Vec)"
    ensures:
      - Returns layer-direction rule
      - Returns context-isolation rule
      - Returns stability-direction rule

  check_dependency:
    kind: function
    type_constraints:
      - "equals(param(source), &ModuleSpec)"
      - "equals(param(target), &ModuleSpec)"
      - "equals(param(rules), &[Rule])"
      - "equals(param(layer_config), &LayerConfig)"
      - "equals(con(return), Vec)"
    requires:
      - rules is not empty
    ensures:
      - Evaluates each rule's 'when' condition
      - For matching rules, evaluates 'require' condition
      - Returns violation for each unsatisfied require

  evaluate:
    kind: function
    type_constraints:
      - "equals(param(expr), &str)"
      - "equals(param(ctx), &EvalContext)"
      - "fallible(return)"
    requires:
      - expr is valid DSL expression
    ensures:
      - Evaluates boolean expressions
      - Supports AND, OR, NOT operators
      - Supports ==, != comparisons
      - Supports property access (source.X, target.X)
      - Supports can_depend_on method calls
      - Supports exists checks

internal:
  - eval_value
  - eval_module_property
  - eval_can_depend_on
  - eval_exists
  - split_binary_op
  - parse_stability_literal
  - default_when

# Data structures: Rule, RulesConfig, Severity, EvalContext, RuleViolation, LayersInput, LayerDepsInput

depends_on:
  - src/spec.rs

external_deps:
  - serde

forbidden_deps:
  - syn           # rules module doesn't parse code
  - regex         # DSL uses hand-written parser
  - anyhow        # uses Result<T, String> for simplicity

invariants:
  - "evaluate() handles malformed expressions gracefully"
  - "Built-in rules use the same DSL as custom rules"
  - "Rules are evaluated in order"
  - "All violations are collected, not short-circuited"
