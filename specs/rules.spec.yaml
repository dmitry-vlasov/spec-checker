# Spec Checker - Rules module (DSL engine)
# Inherits: language=rust, context=core, stability=stable (root)

module: rules
description: "DSL engine for custom and built-in architectural rules, evaluated against module dependency pairs"
source_path: src/rules.rs

layer: domain

exposes:
  Rule:
    kind: type
    description: "A named architectural rule with when/require conditions and a severity level"
    type_constraints:
      - "is_product(Self)"
      - "serializable"
      - "cloneable"
      - "has_field(Self, name)"
      - "has_field(Self, description)"
      - "has_field(Self, when)"
      - "has_field(Self, require)"
      - "has_field(Self, severity)"

  Severity:
    kind: type
    description: "Rule violation severity: Error (blocks) or Warning (advisory)"
    type_constraints:
      - "is_sum(Self)"
      - "serializable"
      - "cloneable"
      - "has_variant(Self, Error)"
      - "has_variant(Self, Warning)"

  RulesConfig:
    kind: type
    description: "Project-level rules configuration: custom rules, disabled built-ins, and optional custom layer definitions"
    type_constraints:
      - "is_product(Self)"
      - "serializable"
      - "cloneable"
      - "has_field(Self, rules)"
      - "has_field(Self, disable_builtin)"
      - "has_field(Self, layers)"

  RuleViolation:
    kind: type
    description: "A detected rule violation with the rule name, descriptive message, and severity"
    type_constraints:
      - "is_product(Self)"
      - "has_field(Self, rule_name)"
      - "has_field(Self, message)"
      - "has_field(Self, severity)"

  EvalContext:
    kind: type
    description: "Evaluation context for rule expressions, binding source/target modules and layer config"
    type_constraints:
      - "is_product(Self)"
      - "has_field(Self, source)"
      - "has_field(Self, target)"
      - "has_field(Self, layer_config)"

  LayersInput:
    kind: type
    description: "Custom layer config input supporting linear list or explicit DAG format"
    type_constraints:
      - "is_sum(Self)"
      - "serializable"
      - "cloneable"
      - "has_variant(Self, Linear)"
      - "has_variant(Self, Dag)"

  builtin_rules:
    kind: function
    description: "Returns the three built-in rules: layer-direction, context-isolation, stability-direction"
    type_constraints:
      - "equals(con(return), Vec)"
    ensures:
      - Returns layer-direction rule
      - Returns context-isolation rule
      - Returns stability-direction rule
      - Returns exactly 3 rules

  check_dependency:
    kind: function
    description: "Evaluates all rules against a source→target dependency pair, collecting violations"
    type_constraints:
      - "equals(param(source), ModuleSpec)"
      - "equals(param(target), ModuleSpec)"
      - "equals(con(return), Vec)"
    ensures:
      - Evaluates each rule's 'when' condition
      - For matching rules, evaluates 'require' condition
      - Returns violation for each unsatisfied require
      - Collects all violations, does not short-circuit

  evaluate:
    kind: function
    description: "Evaluates a boolean DSL expression against an EvalContext, supporting AND/OR/NOT, comparisons, and method calls"
    type_constraints:
      - "equals(param(expr), str)"
      - "fallible(return)"
    ensures:
      - Evaluates boolean expressions
      - Supports AND, OR, NOT operators
      - Supports ==, != comparisons
      - Supports property access (source.X, target.X)
      - Supports can_depend_on method calls
      - Returns true for "true", false for "false"

depends_on:
  - src/spec.rs

external_deps:
  - serde

forbidden_deps:
  - syn           # rules module doesn't parse code
  - regex         # DSL uses hand-written parser
  - anyhow        # uses Result<T, String> for simplicity

invariants:
  - "evaluate() handles malformed expressions gracefully"
  - "Built-in rules use the same DSL as custom rules"
  - "Rules are evaluated in order"
  - "All violations are collected, not short-circuited"
  - "No unsafe code"
