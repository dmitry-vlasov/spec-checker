module: rules
description: Architectural rule engine that evaluates dependency constraints (layer direction, context isolation, stability) against module specs.
language: rust
source_path: src/rules.rs
source_hash: 624e1c21ff551cb2
layer: domain
forbidden_deps:
  - src/main.rs
  - src/cli.rs
  - src/ai_enrichment.rs
  - src/smt.rs
  - src/extractors
exposes:
  Rule:
    kind: type
    description: A named architectural rule with a when-condition and a require-expression evaluated against module pairs.
  Severity:
    kind: type
    description: Rule violation severity — error or warning.
  RulesConfig:
    kind: type
    description: Project-level rules configuration including custom rules, disabled built-ins, and optional custom layers.
  LayersInput:
    kind: type
    description: User-facing layer config input supporting linear list or explicit DAG formats.
  LayersInput.to_layer_config:
    kind: function
    description: Convert a LayersInput into a LayerConfig usable by the rule engine.
  builtin_rules:
    kind: function
    description: Return the three default architectural rules (layer-direction, context-isolation, stability-direction).
  check_dependency:
    kind: function
    description: Evaluate all rules against a source/target module pair and return any violations.
  evaluate:
    kind: function
    description: Evaluate a rule expression string against a source/target module pair context.
  EvalContext:
    kind: type
    description: Context bundle holding source module, target module, and layer config for rule evaluation.
  RuleViolation:
    kind: type
    description: A detected rule violation with rule name, message, and severity.
owns_state:
  - Rule
  - Severity
  - RulesConfig
  - LayersInput
  - LayerDepsInput
  - EvalContext
  - RuleViolation
