module: spec
description: Core data model for module, subsystem, and layer specifications — the schema that all other modules produce or consume.
language: rust
source_path: src/spec.rs
source_hash: 463db0c171e8f628
layer: domain
forbidden_deps:
  - src/main.rs
  - src/cli.rs
  - src/ai_enrichment.rs
  - src/smt.rs
exposes:
  ModuleSpec:
    kind: type
    description: Central YAML-backed specification for a single source module, carrying layer, dependencies, contracts, and protocol.
  ModuleSpec.apply_defaults:
    kind: function
    description: Merge directory-level SpecDefaults into this module spec (inheriting layer, context, stability, etc.).
  ModuleSpec.from_extracted:
    kind: function
    description: Construct a skeleton ModuleSpec from an ExtractedModule produced by a language extractor.
  SubsystemSpec:
    kind: type
    description: Specification for a subsystem grouping multiple modules with its own interface and invariants.
  SubsystemExposeSpec:
    kind: type
    description: An entry in a subsystem's public interface, optionally delegating to a module function.
  ExposeSpec:
    kind: type
    description: Contract for a single publicly exposed entity (function or type), including pre/postconditions and type constraints.
  ProtocolSpec:
    kind: type
    description: State-machine protocol defining valid call sequences on a module.
  Transition:
    kind: type
    description: A single state transition in a ProtocolSpec (from, call, to).
  Layer:
    kind: type
    description: Architectural layer tag (a lowercased string wrapper) for vertical stratification.
  LayerConfig:
    kind: type
    description: DAG of allowed inter-layer dependencies used by rule evaluation.
  LayerConfig.builtin:
    kind: function
    description: Return the default four-layer model (infrastructure, domain, application, interface).
  LayerConfig.from_linear:
    kind: function
    description: Build a LayerConfig from an ordered list where each layer may depend on all layers below it.
  LayerConfig.from_dag:
    kind: function
    description: Build a LayerConfig from an explicit mapping of layer to allowed dependencies.
  LayerConfig.can_depend_on:
    kind: function
    description: Check whether one layer is allowed to depend on another according to this config.
  Stability:
    kind: type
    description: Change-frequency tag (stable/normal/volatile) governing stability-direction rules.
  Stability.can_depend_on:
    kind: function
    description: Check whether a module of this stability level may depend on a module of another level.
  SpecDefaults:
    kind: type
    description: Directory-level default values inherited by specs via _defaults.yaml files.
  SpecDefaults.merge:
    kind: function
    description: Overlay a child SpecDefaults on top of this parent, with scalar-override and list-union semantics.
  resolve_defaults:
    kind: function
    description: Walk the directory tree from a spec file up to the root, merging _defaults.yaml at each level.
  compute_source_hash:
    kind: function
    description: Compute a truncated SHA-256 hash of a source file for staleness detection.
owns_state:
  - SpecDefaults
  - ModuleSpec
  - ProtocolSpec
  - Transition
  - SubsystemSpec
  - SubsystemExposeSpec
  - ExposeSpec
  - Layer
  - LayerConfig
  - Stability
