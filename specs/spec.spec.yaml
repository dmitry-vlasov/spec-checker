# Spec Checker - Spec module (data structures)
# Inherits: language=rust, context=core, stability=stable (root)

module: spec
source_path: src/spec.rs

layer: domain

exposes:
  ModuleSpec:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "serializable"
      - "cloneable"
      - "has_field(Self, module)"
      - "has_field(Self, exposes)"
      - "has_field(Self, depends_on)"
      - "has_field(Self, forbidden_deps)"
      - "has_field(Self, layer)"
      - "has_field(Self, context)"
      - "has_field(Self, stability)"

  ExposeSpec:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "serializable"
      - "cloneable"
      - "has_field(Self, kind)"
      - "has_field(Self, type_constraints)"
      - "has_field(Self, requires)"
      - "has_field(Self, ensures)"

  SpecDefaults:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "serializable"
      - "cloneable"
      - "has_field(Self, language)"
      - "has_field(Self, layer)"
      - "has_field(Self, stability)"
      - "has_field(Self, forbidden_deps)"

  Layer:
    kind: type
    type_constraints:
      - "serializable"
      - "cloneable"

  Stability:
    kind: type
    type_constraints:
      - "is_sum(Self)"
      - "serializable"
      - "cloneable"
      - "has_variant(Self, Stable)"
      - "has_variant(Self, Normal)"
      - "has_variant(Self, Volatile)"

  LayerConfig:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "cloneable"

  ModuleSpec.from_extracted:
    kind: function
    type_constraints:
      - "equals(param(extracted), ExtractedModule)"
      - "equals(return, Self)"
    ensures:
      - Creates ModuleSpec from extracted implementation
      - Populates exposes from public_functions
      - Populates internal from private_functions
      - Populates emits from events

  ModuleSpec.apply_defaults:
    kind: function

  SpecDefaults.merge:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"
      - "equals(return, SpecDefaults)"
    ensures:
      - "Scalars: child wins if set"
      - "Lists: union of both"

  Layer.new:
    kind: function
    type_constraints:
      - "equals(param(name), str)"
      - "equals(return, Self)"
    ensures:
      - Lowercases the input name

  LayerConfig.builtin:
    kind: function
    type_constraints:
      - "equals(return, Self)"
    ensures:
      - Returns 4-layer model (infrastructure/domain/application/interface)

  LayerConfig.can_depend_on:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"
      - "equals(return, bool)"

  Stability.can_depend_on:
    kind: function
    type_constraints:
      - "equals(param(0), Self)"
      - "equals(return, bool)"
    ensures:
      - Stable can only depend on Stable
      - Normal cannot depend on Volatile
      - Volatile can depend on anything

  resolve_defaults:
    kind: function
    type_constraints:
      - "equals(param(spec_dir), Path)"
      - "equals(param(root_dir), Path)"
      - "equals(return, SpecDefaults)"
    ensures:
      - Walks directory chain from root_dir to spec_dir
      - Loads _defaults.yaml at each level
      - Merges defaults (parent first, child overlays)

depends_on:
  - src/extractors/mod.rs    # Uses ExtractedModule type

external_deps:
  - serde
  - serde_yaml

forbidden_deps:
  - syn           # belongs in extractors
  - regex         # belongs in extractors

invariants:
  - "Layer dependencies are acyclic"
  - "Stable cannot depend on Normal or Volatile"
  - "Normal cannot depend on Volatile"
  - "apply_defaults never overwrites explicitly set fields"
  - "List fields merge (union), scalar fields override"
