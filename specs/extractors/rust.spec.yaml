# Spec Checker - Rust Extractor
# Inherits: language=rust, context=core, stability=stable (root)
# Inherits: layer=infrastructure, forbidden_deps=[clap, colored] (extractors)

module: rust
source_path: src/extractors/rust.rs

exposes:
  RustExtractor:
    kind: type
    type_constraints:
      - "is_product(Self)"

  RustExtractor.new:
    kind: function
    type_constraints:
      - "equals(return, Self)"

depends_on: []

external_deps:
  - anyhow
  - syn           # Rust AST parsing
  - quote         # token stream handling

forbidden_deps:
  - regex         # use syn for proper parsing
  - serde_json    # Solidity-specific

invariants:
  - "Uses syn for proper AST parsing (not regex)"
  - "Extracts: functions, structs, enums, traits, impl methods, use statements"
  - "Qualifies method names with parent type via dot delimiter (Type.method)"
  - "Flattens nested use trees: use a::{b::{c, d}} -> [a::b::c, a::b::d]"
  - "Filters test modules (#[cfg(test)])"
  - "Filters internal imports (crate::, super::)"
  - "Records trait implementations and derive macros per type"
  - "No unsafe code"
