# Spec Checker - Solidity Extractor
# Inherits: language=rust, context=core, stability=stable (root)
# Inherits: layer=infrastructure, forbidden_deps=[clap, colored] (extractors)

module: solidity
source_path: src/extractors/solidity.rs

exposes:
  SolidityExtractor:
    kind: type
    type_constraints:
      - "is_product(Self)"
      - "is_subtype(Self, Extractor)"

  SolidityExtractor.new:
    kind: function
    type_constraints:
      - "equals(return, Self)"
    ensures:
      - Creates SolidityExtractor instance

# Implements Extractor trait (via impl block):
#   extract(&self, path: &PathBuf) -> Result<ExtractedModule>

depends_on: []

external_deps:
  - anyhow
  - serde
  - serde_json
  - regex         # fallback when solc unavailable

forbidden_deps:
  - syn           # Rust-specific
  - serde_yaml    # no YAML parsing

invariants:
  - "Uses solc AST when available, regex as fallback"
  - "Extracts: functions, events, imports, state variables, modifiers"
  - "Identifies visibility: public, external, internal, private"
