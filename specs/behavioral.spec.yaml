module: behavioral
description: "Three-tier invariant verification: classifies spec invariants into static-checkable vs behavioral, runs pattern-based static checks, and delegates behavioral checks to an LLM with caching."
language: rust
source_path: src/behavioral.rs
source_hash: 46f6fdfefaead876
layer: infrastructure
exposes:
  classify_invariant:
    kind: function
    description: "Classify an invariant text as statically checkable or requiring LLM behavioral verification."
  check_static_invariant:
    kind: function
    description: "Run pattern-based static checks on an invariant that does not require LLM comprehension."
  collect_invariants:
    kind: function
    description: "Gather all module-level and function-level invariants from a spec, classified by verification tier."
  check_behavioral:
    kind: function
    description: "Orchestrate full behavioral checking for a module: static checks, cache lookups, and LLM calls."
  llm_verify:
    kind: function
    description: "Call an LLM API to verify whether source code satisfies a single invariant."
  estimate_tokens:
    kind: function
    description: "Rough token-count estimate for an invariant verification prompt."
  strip_tests:
    kind: function
    description: "Remove test modules from source code to avoid false positives in static checks."
  cache_key:
    kind: function
    description: "Compute a deterministic SHA-256 cache key from source code and invariant text."
  read_cache:
    kind: function
    description: "Load a cached LLM verification result from disk, if present."
  write_cache:
    kind: function
    description: "Persist an LLM verification result to the on-disk cache."
  InvariantTier:
    kind: type
    description: "Whether an invariant is verifiable statically or requires LLM behavioral analysis."
  ClassifiedInvariant:
    kind: type
    description: "An invariant paired with its verification tier and owning module metadata."
  InvariantResult:
    kind: type
    description: "Outcome of verifying a single invariant: pass/fail plus reasoning."
  CachedResult:
    kind: type
    description: "Serializable cached LLM verification result with provenance metadata."
  BehavioralSummary:
    kind: type
    description: "Aggregate pass/fail/skip counts and failure details from a behavioral check run."
  LlmCheckMode:
    kind: type
    description: "Operational mode for LLM checks: off, dry-run, cached-only, or full."
  LlmProvider:
    kind: type
    description: "Supported LLM API providers: Anthropic or OpenAI-compatible."
  LlmConfig:
    kind: type
    description: "Resolved configuration for LLM endpoint, model, credentials, and operational parameters."
  LlmConfig.detect_provider:
    kind: function
    description: "Infer the LLM provider from an endpoint URL."
  LlmConfig.resolve_api_key:
    kind: function
    description: "Resolve the API key from config or environment variables based on provider."
  LlmConfig.api_url:
    kind: function
    description: "Build the full chat/messages API URL for the configured provider."
  LlmConfig.is_ollama:
    kind: function
    description: "Check whether the endpoint targets a local Ollama instance."
forbidden_deps:
  - extractors
  - main
  - ai_init
  - ai_refine
owns_state:
  - InvariantTier
  - ClassifiedInvariant
  - InvariantResult
  - CachedResult
  - LlmCheckMode
  - LlmProvider
  - LlmConfig
  - LlmResponse
  - BehavioralSummary
  - DEFAULT_LOCAL_LLM_COOLDOWN_SECS
  - DEFAULT_OLLAMA_NUM_CTX
