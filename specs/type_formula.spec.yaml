module: type_formula
description: Type formula DSL — parser and evaluator for abstract predicates over types (structural queries, trait bounds, logical connectives).
language: rust
source_path: src/type_formula.rs
source_hash: 798752f4161d88cd
layer: domain
forbidden_deps:
  - src/main.rs
  - src/cli.rs
  - src/ai_enrichment.rs
  - src/spec.rs
  - src/rules.rs
  - src/smt.rs
  - src/extractors
exposes:
  ParamRef:
    kind: type
    description: Reference to a function parameter by index or name.
  TypeExpr:
    kind: type
    description: AST node for type-level expressions (field, param, con, arg, apply, function, sum, product, etc.).
  Predicate:
    kind: type
    description: A predicate over types — equality, pattern match, subtype check, trait bound, or structural query.
  Formula:
    kind: type
    description: Logical formula combining predicates with and/or/not/implies connectives.
  TypeEvalContext:
    kind: type
    description: Evaluation context providing the current type, function, and project-wide type/function definitions.
  ParseError:
    kind: type
    description: Error returned when a formula string fails to parse.
  EvalError:
    kind: type
    description: Error returned when formula evaluation fails at runtime.
  parse_formula:
    kind: function
    description: Parse a type-formula string into a Formula AST.
  evaluate_formula:
    kind: function
    description: Evaluate a Formula AST against a TypeEvalContext, returning true/false or an error.
  parse_type_repr_from_str:
    kind: function
    description: Parse a type representation string into a TypeRepr value.
owns_state:
  - ParamRef
  - TypeExpr
  - Predicate
  - Formula
  - TypeEvalContext
  - ParseError
  - EvalError
