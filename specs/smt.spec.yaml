module: smt
description: SMT solver integration that generates SMT-LIB2 queries and invokes z3 to verify constraint consistency in the middle tier of the verification cascade.
language: rust
source_path: src/smt.rs
source_hash: c1a2b5c090a8377b
layer: infrastructure
forbidden_deps:
  - src/main.rs
  - src/cli.rs
  - src/spec.rs
  - src/rules.rs
  - src/extractors
exposes:
  SmtResult:
    kind: type
    description: Outcome of an SMT query — sat, unsat, unknown, or error.
  SmtQuery:
    kind: type
    description: Builder for SMT-LIB2 assertion sets with variable declarations and constraints.
  SmtQuery.new:
    kind: function
    description: Create an empty SMT query.
  SmtQuery.declare_int:
    kind: function
    description: Declare an integer variable in the query.
  SmtQuery.declare_bool:
    kind: function
    description: Declare a boolean variable in the query.
  SmtQuery.assert_raw:
    kind: function
    description: Add a raw SMT-LIB2 assertion expression.
  SmtQuery.assert_eq:
    kind: function
    description: Assert equality between two expressions.
  SmtQuery.assert_ge:
    kind: function
    description: Assert a >= b.
  SmtQuery.assert_gt:
    kind: function
    description: Assert a > b.
  SmtQuery.assert_ne:
    kind: function
    description: Assert a != b.
  SmtQuery.assert_implies:
    kind: function
    description: Assert logical implication (premise => conclusion).
  SmtQuery.to_smtlib2:
    kind: function
    description: Render the query as a complete SMT-LIB2 string.
  SmtQuery.check_sat:
    kind: function
    description: Submit the query to z3 and return the satisfiability result.
  solver_available:
    kind: function
    description: Check whether the z3 solver binary is available on the system.
  check_state_ownership_consistency:
    kind: function
    description: Verify that a set of state-ownership claims are mutually exclusive using SMT.
  check_numeric_constraints:
    kind: function
    description: Check satisfiability of a set of numeric bound constraints.
  check_implication:
    kind: function
    description: Verify whether premises logically imply a conclusion by checking negation unsatisfiability.
owns_state:
  - SmtResult
  - SmtQuery
